name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies and generate deployment zip
      run: |
        pip install -r requirements.txt
        # We zip the source code and requirements to send to AWS
        zip -r deploy.zip . -x "*.git*" ".github*"

    - name: Deploy to Elastic Beanstalk
      uses: einaregilsson/beanstalk-deploy@v21
      with:
        aws_access_key: ${{ secrets.AKIA2GB7W3PUROAWAORH }}
        aws_secret_key: ${{ secrets.eKYw93GKKFPYU0s13P14FUtSDeChCAto95/2dtRY }}
        application_name: AIR QUALITY SYSTEM # Make sure this matches your AWS app name
        environment_name: AIRQUALITYSYSTEM-env  # Make sure this matches your AWS env name
        version_label: "v-${{ github.sha }}-${{ github.run_number }}"
        region: us-east-1 # Change this if your AWS region is different
        deployment_package: deploy.zip

        
